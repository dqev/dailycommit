    <!-- ─── JSON-LD: FAQPage ───────────────────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is Daily Commit safe to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Daily Commit never sends your GitHub token to any external server. Your Personal Access Token is stored only in your browser's localStorage using Base64 obfuscation, and API calls go directly from your browser to api.github.com. The GitHub Actions workflow uses GitHub's built-in temporary GITHUB_TOKEN, not your PAT."
          }
        },
        {
          "@type": "Question",
          "name": "How does Daily Commit keep my GitHub streak alive?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Daily Commit sets up a GitHub Actions workflow in your connected repository. This workflow runs on a cron schedule you configure (e.g. daily, twice daily, or every 6 hours) and appends a timestamped line to an activity file, then pushes a commit — keeping your contribution heatmap green automatically."
          }
        },
        {
          "@type": "Question",
          "name": "Does Daily Commit require a backend or server?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Daily Commit is fully serverless. The dashboard runs entirely in your browser. Commit scheduling is handled by GitHub Actions running in the cloud inside your own repository. No credentials or data are ever sent to a third-party server."
          }
        },
        {
          "@type": "Question",
          "name": "What GitHub permissions does Daily Commit need?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Daily Commit requires a GitHub Personal Access Token (PAT) with the 'repo' scope (to commit and push to your repository) and the 'workflow' scope (to create and update GitHub Actions workflows). You can generate a classic PAT from GitHub Settings → Developer Settings → Personal Access Tokens."
          }
        },
        {
          "@type": "Question",
          "name": "What is the Mass Boost Engine?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The Mass Boost Engine lets you push between 1 and 100,000 commits to your repository instantly. This is useful if you want to fill in past dates on your GitHub contribution heatmap. When used locally, commits are created via git directly and pushed in a single batch for maximum speed."
          }
        },
        {
          "@type": "Question",
          "name": "What is Streak Bulletproof mode?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Streak Bulletproof mode schedules the auto-commit GitHub Action to run every 6 hours (0 */6 * * *). GitHub Actions cron jobs can be delayed by 15–60 minutes during high queue traffic. Running every 6 hours guarantees at least one commit lands within the same calendar day, no matter the queue delay."
          }
        }
      ]
    }
    </script>
